<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perhitungan Retribusi Jasa Usaha</title>

  <!-- GOOGLE ANALYTICS GA4 -->
  <!-- GANTI G-XXXXXXXXXX dengan Measurement ID Anda -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F0LPTJ4WFX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F0LPTJ4WFX');
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      font-size: 14px;
    }
    button {
      margin-top: 20px;
      background-color: #007bff;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0056b3;
    }
    .wa-btn {
      background-color: #25D366;
      margin-top: 10px;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e9f5ff;
      border-radius: 6px;
      font-size: 16px;
    }
    .admin {
      display: none; /* Disembunyikan dari tampilan pengguna */
      margin-top: 40px;
      padding-top: 20px;
      border-top: 2px dashed #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Retribusi Jasa Usaha</h1>

    <!-- FORM PENGGUNA -->
    <h2>Form Perhitungan</h2>

    <label>Jenis Pemasangan Iklan</label>
    <select id="jenis">
      <option value="Banner">Banner</option>
      <option value="Baliho">Baliho</option>
      <option value="Space Promosi">Space Promosi</option>
    </select>

    <label>Luas (m²)</label>
    <input type="number" id="luas" placeholder="Masukkan luas" />

    <label>Jumlah Hari</label>
    <input type="number" id="hari" placeholder="Masukkan jumlah hari" />

    <label>Nama Pemesan</label>
    <input type="text" id="namaPemesan" placeholder="Masukkan nama pemesan" />

    <button onclick="hitungRetribusi()">Hitung Retribusi</button>

    <div class="result" id="hasil">Total Retribusi: Rp 0</div>

    <button class="wa-btn" onclick="kirimWhatsApp()">Kirim via WhatsApp</button>

    <!-- PENGATURAN TARIF ADMIN -->
    <!-- PENGATURAN TARIF ADMIN (DISIMPAN DI SOURCE CODE, TIDAK TAMPIL) -->
    <div class="admin">
      <h2>Pengaturan Tarif (Admin)</h2>

      <label>Tarif Banner (Rp / m² / hari)</label>
      <input type="number" id="tarifBanner" value="5000" />

      <label>Tarif Baliho (Rp / m² / hari)</label>
      <input type="number" id="tarifBaliho" value="10000" />

      <label>Tarif Space Promosi (Rp / m² / hari)</label>
      <input type="number" id="tarifSpace" value="8000" />
    </div>
  </div>

  <script>
    function hitungRetribusi() {
      const jenis = document.getElementById('jenis').value;
      const luas = parseFloat(document.getElementById('luas').value) || 0;
      const hari = parseFloat(document.getElementById('hari').value) || 0;

      const tarifBanner = parseFloat(document.getElementById('tarifBanner').value) || 0;
      const tarifBaliho = parseFloat(document.getElementById('tarifBaliho').value) || 0;
      const tarifSpace = parseFloat(document.getElementById('tarifSpace').value) || 0;

      let tarif = 0;
      if (jenis === 'Banner') tarif = tarifBanner;
      if (jenis === 'Baliho') tarif = tarifBaliho;
      if (jenis === 'Space Promosi') tarif = tarifSpace;

      const total = tarif * luas * hari;
      document.getElementById('hasil').innerText = 'Total Retribusi: Rp ' + total.toLocaleString('id-ID');
    }

    function kirimWhatsApp() {
      const jenis = document.getElementById('jenis').value;
      const luas = document.getElementById('luas').value;
      const hari = document.getElementById('hari').value;
      const nama = document.getElementById('namaPemesan').value;
      const hasil = document.getElementById('hasil').innerText;

      const nomorWA = '6281234567890'; // GANTI dengan nomor WhatsApp tujuan resmi

      const pesan = `Permohonan Informasi Retribusi Jasa Usaha%0A%0A` +
        `Nama Pemesan : ${nama}%0A
        Jenis Iklan : ${jenis}%0A` +
        `Luas        : ${luas} m2%0A` +
        `Durasi      : ${hari} hari%0A` +
        `${hasil}%0A%0A` +
        `Mohon ditindaklanjuti. Terima kasih.`;

      const url = `https://wa.me/${nomorWA}?text=${pesan}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
